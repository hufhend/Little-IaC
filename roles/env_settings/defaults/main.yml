---
# default value for language setting
language: english
desktop: false

timezone: Europe/Prague
country: Czech
lang: cs_CZ.UTF-8

# LDAP/AD integration defaults
ad_domain: "example.com"
ldap_uri: "ldaps://ldap.example.com/"
bind_dn: "cn=service-account,OU=ServiceAccounts,DC=example,DC=com"
user_search_base: "ou=Users,DC=example,DC=com"
group_search_base: "ou=Groups,DC=example,DC=com"
search_base: "DC=example,DC=com"
allowed_groups: "APP-Linux-Users,APP-Linux-Admins"
fallback_homedir: "/home/%u"
default_shell: "/bin/bash"
override_gid: 100
ldap_service_port: 636
ldap_tls_cacertdir: "/etc/openldap/cacerts"
ca_cert_path: "/etc/ssl/certs/ca-certificates.crt"
sssd_services: "nss, pam"
debug_level: 0
ldap_default_authtok: #OBFUSCATED_PASSWORD#

# uploading internal certificates
add_certs: false

# Example:
#   sudo_config:
#     - username: alice
#       nopasswd: true
#       commands: ALL
#     - username: bob
#       nopasswd: false
#       commands: /usr/bin/apt

ocp_aliases_dest: ".bash_aliases_ocp"
skel_dest: "/etc/skel/.bash_aliases_ocp"
exclude_users:
  - root
  # - "{{ user_ansible }}"
  - lost+found
  - ubuntu
  - data

# Starship prompt
starship_config: false
starship_config_dest: ".config/starship.toml"
starship_skel_dest: "/etc/skel/.config/starship.toml"

ocp_login: false
# default sample values for ocp_login
ocp_clusters:
  # Development environment
  dev:
    emoji: '🔵'
    name: 'Development'
    url: 'https://api.dev-cluster.example.com:6443'
    config: 'config_ocp_dev'
    environment: 'development'
    region: 'eu-central-1'
    description: 'Development cluster for testing'
    starship:
      style: 'blue'
      # symbol: '⛵ '
    type: 'openshift'

  # Test environment
  test:
    emoji: '🟢'
    name: 'Test'
    url: 'https://api.test-cluster.example.com:6443'
    config: 'config_ocp_test'
    environment: 'testing'
    region: 'eu-central-1'
    description: 'Experimental features and testing'
    starship:
      style: 'green'
      # symbol: '⛵ '
    type: 'openshift'

  # Staging environment
  staging:
    emoji: '🟡'
    name: 'Staging'
    url: 'https://api.staging-cluster.example.com:6443'
    config: 'config_ocp_staging'
    environment: 'staging'
    region: 'eu-central-1'
    description: 'Pre-production validation'
    starship:
      style: 'yellow'
      # symbol: '⛵ '
    type: 'openshift'

  # Production environment
  prod:
    emoji: '🔴'
    name: 'Production'
    url: 'https://api.prod-cluster.example.com:6443'
    config: 'config_ocp_prod'
    environment: 'production'
    region: 'eu-central-1'
    description: 'Live production traffic'
    starship:
      style: 'red'
      # symbol: '⛵ '
    type: 'openshift'

  # # Disaster Recovery
