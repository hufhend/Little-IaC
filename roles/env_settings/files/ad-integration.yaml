---
- name: Set LDAP/AD integration variables
  ansible.builtin.set_fact:
    ldap_id_use_start_tls: "{{ 'True' if (ldap_uri is defined and ldap_uri.startswith('ldap://')) else 'False' }}"

- name: Install and configure LDAP/AD authentication
  block:
    - name: Install required packages
      ansible.builtin.package:
        name:
          - sssd
          - sssd-tools
          - sssd-idp
          - oddjob
          - oddjob-mkhomedir
        state: present

    - name: Install additional packages for Ubuntu
      ansible.builtin.apt:
        name:
          - libpam-sss
          - libnss-sss
          - libpam-modules
        state: present
        update_cache: yes
      when: ansible_facts["os_family"] == "Debian"

    - name: Create SSSD configuration from template
      ansible.builtin.template:
        src: sssd.conf.j2
        dest: /etc/sssd/sssd.conf
        mode: 0600
        owner: root
        group: root
      notify: Restart SSSD

    - name: Apply configuration changes
      meta: flush_handlers

    - name: Enable home directory creation (RedHat)
      command: authselect select sssd with-mkhomedir --force
      args:
        creates: /etc/authselect/current
      when: ansible_facts["os_family"] == "RedHat"

    - name: Enable home directory creation (Ubuntu)
      block:
        - name: Configure PAM for automatic home directories
          ansible.builtin.lineinfile:
            path: "/etc/pam.d/{{ item }}"
            regexp: '^session\s+required\s+pam_mkhomedir.so'
            line: 'session required pam_mkhomedir.so skel=/etc/skel umask=0022'
            insertafter: '^session.*pam_unix.so'
          loop:
            - common-session
            - common-session-noninteractive
      when: ansible_facts["os_family"] == "Debian"

    - name: Start oddjobd service
      systemd:
        name: oddjobd
        state: started
        enabled: yes

    - name: Start SSSD service
      systemd:
        name: sssd
        state: started
        enabled: yes

    - name: Show current authentication configuration (RedHat)
      command: authselect current
      register: auth_status
      changed_when: false
      when: ansible_facts["os_family"] == "RedHat"

    - name: Display authentication status with details (RedHat)
      block:
        - name: Extract authselect profile
          ansible.builtin.set_fact:
            auth_profile: "{{ auth_status.stdout_lines[0] | regex_replace('Profile ID: ', '') }}"

        - name: Extract authselect features
          ansible.builtin.set_fact:
            auth_features: "{{ auth_status.stdout_lines[2:] | join(', ') | regex_replace('^- ', '') }}"

        - name: Display formatted status
          ansible.builtin.debug:
            msg:
              - "┌─────────────────────────────────┐"
              - "│      AUTHENTICATION STATUS      │"
              - "├─────────────────────────────────┤"
              - "│ Profile  :  {{ auth_profile }}"
              - "│ Features :  {{ auth_features }}"
              - "└─────────────────────────────────┘"
      when: ansible_facts["os_family"] == "RedHat" and auth_status is defined

    - name: Display authentication status for Ubuntu
      ansible.builtin.debug:
        msg:
          - "┌─────────────────────────────────┐"
          - "│      AUTHENTICATION STATUS      │"
          - "├─────────────────────────────────┤"
          - "│ System    :  Ubuntu             │"
          - "│ Method    :  PAM + SSSD         │"
          - "│ Home dirs :  mkhomedir enabled  │"
          - "│ PAM files :  common-session     │"
          - "└─────────────────────────────────┘"
      when: ansible_facts["os_family"] == "Debian"

    - name: Display configuration instructions
      ansible.builtin.debug:
        msg:
          - "LDAP/AD integration configured successfully!"
          - "Configured domains: {{ sssd_domains.keys() | join(', ') }}"

  when:
    - ad_integration | default(false) | bool
    - ansible_facts["os_family"] in ["RedHat", "Debian"]